# Codemagic Build Config for QuestionCall Android APK
# Simplified & Corrected Build Pipeline
#
# Key Points:
# - JS bundling is handled by Gradle (already integrated)
# - Patches applied automatically via postinstall hook
# - No need for manual expo export:embed step
# - Environment variables loaded from Codemagic UI (not .env file)
# - NDK version is controlled by android/app/build.gradle (ndkVersion property)

workflows:
  android-apk-release:
    name: QuestionCall Android APK (Release)
    max_build_duration: 120 # First build can take 2+ min
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true

    environment:
      groups:
        - questioncall_env # Add your env vars in Codemagic UI under this group
      node: 18
      java: 17
      vars:
        ANDROID_SDK_ROOT: /opt/android-sdk-linux

    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.m2
        - node_modules

    scripts:
      - name: Set up environment
        script: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Java version: $(java -version)"
          
      - name: Install dependencies
        script: |
          npm ci
          # ⬆️ Auto-runs: postinstall hook → patch-package
          # ⬆️ Patches: @livekit, react-native-callkeep

      - name: Verify Expo setup
        script: |
          npx expo doctor || echo "Expo doctor warnings are non-fatal"

      - name: Verify google-services.json
        script: |
          if [ ! -f "google-services.json" ]; then
            echo "❌ ERROR: google-services.json not found!"
            exit 1
          fi
          echo "✅ google-services.json found"

      - name: Clean Android build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      - name: Build Android APK (Release)
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      # Optional: Add other publishing methods
      # slack:
      #   channel: '#releases'
      #   notify_on_build_start: true

  android-apk-staging:
    name: QuestionCall Android APK (Staging)
    max_build_duration: 120
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true

    environment:
      groups:
        - questioncall_env
      node: 18
      java: 17
      vars:
        ANDROID_SDK_ROOT: /opt/android-sdk-linux

    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.m2
        - node_modules

    scripts:
      - name: Set up environment
        script: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Java version: $(java -version)"
          
      - name: Install dependencies
        script: npm ci

      - name: Verify Expo setup
        script: npx expo doctor || echo "Expo doctor warnings are non-fatal"

      - name: Verify google-services.json
        script: |
          if [ ! -f "google-services.json" ]; then
            echo "❌ ERROR: google-services.json not found!"
            exit 1
          fi
          echo "✅ google-services.json found"

      - name: Clean Android build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      - name: Build Android APK (Debug)
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
